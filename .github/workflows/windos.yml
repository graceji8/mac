name: Windows Remote
on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Session Duration
        shell: powershell
        run: |
          $duration = [int]"${{ github.event.inputs.session_duration }}"
          if ($duration -gt 350) { $duration = 350 }
          echo "SESSION_MINUTES=$duration" >> $env:GITHUB_ENV
          echo "Session will run for $duration minutes"

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          echo "✅ RDP enabled on port 3389"

      - name: Set RDP Password
        shell: powershell
        run: |
          $password = "P@ssw0rd!RDP2024"
          net user runneradmin $password
          echo "✅ RDP credentials set"

      - name: Install TightVNC Server
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" -OutFile "tightvnc.msi"
          Start-Process msiexec -ArgumentList "/i tightvnc.msi /quiet ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_VNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=vnc1234 SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=admin1234" -Wait
          Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
          echo "✅ VNC Server started on port 5900"

      - name: Install Node.js 18 and code-server
        shell: powershell
        run: |
          # Uninstall current Node.js (v24 is too new for code-server)
          winget uninstall OpenJS.NodeJS.LTS --silent --accept-source-agreements
          Start-Sleep -Seconds 3

          # Install Node.js 18 LTS (compatible with code-server)
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v18.20.4/node-v18.20.4-x64.msi" -OutFile "node18.msi"
          Start-Process msiexec -ArgumentList "/i node18.msi /quiet /norestart" -Wait
          Start-Sleep -Seconds 5

          # Refresh PATH
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")

          # Verify node version
          node --version

          # Install code-server
          npm install -g code-server --unsafe-perm

          # Start code-server
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
          $codeServer = (Get-Command code-server).Source
          Start-Process -FilePath "node" -ArgumentList "$codeServer --auth password --bind-addr 0.0.0.0:8080 --password vscode1234" -NoNewWindow
          Start-Sleep -Seconds 5
          echo "✅ code-server started on port 8080"

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5
          echo "✅ Tailscale installed"

      - name: Get Tailscale OAuth Token
        shell: powershell
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          # Exchange OAuth credentials for an auth token
          $body = @{
            client_id     = $env:TS_OAUTH_CLIENT_ID
            client_secret = $env:TS_OAUTH_SECRET
            grant_type    = "client_credentials"
            scope         = "devices:write"
          }
          $response = Invoke-RestMethod `
            -Uri "https://api.tailscale.com/api/v2/oauth/token" `
            -Method POST `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $body
          $token = $response.access_token
          echo "TS_ACCESS_TOKEN=$token" >> $env:GITHUB_ENV
          echo "✅ OAuth token obtained"

      - name: Connect to Tailscale
        shell: powershell
        run: |
          $tailscale = "C:\Program Files\Tailscale\tailscale.exe"
          & $tailscale up `
            --authkey=$env:TS_ACCESS_TOKEN `
            --hostname="github-runner-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false
          Start-Sleep -Seconds 10

          $ip = & $tailscale ip -4
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

          echo "=========================================="
          echo " TAILSCALE CONNECTION INFO"
          echo "=========================================="
          echo " Tailscale IP : $ip"
          echo " RDP  → $ip:3389  | User: runneradmin | Pass: P@ssw0rd!RDP2024"
          echo " VNC  → $ip:5900  | Pass: vnc1234"
          echo " Code → http://$ip:8080 | Pass: vscode1234"
          echo "=========================================="

      - name: Print Connection Summary
        shell: powershell
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║         REMOTE ACCESS CONNECTION SUMMARY         ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║ Tailscale IP : $env:TAILSCALE_IP"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║ RDP  → $env:TAILSCALE_IP:3389"
          echo "║   User : runneradmin"
          echo "║   Pass : P@ssw0rd!RDP2024"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║ VNC  → $env:TAILSCALE_IP:5900"
          echo "║   Pass : vnc1234"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║ Code → http://$env:TAILSCALE_IP:8080"
          echo "║   Pass : vscode1234"
          echo "╚══════════════════════════════════════════════════╝"

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ github.event.inputs.session_duration }}"
          if ($minutes -gt 350) { $minutes = 350 }
          $seconds = $minutes * 60
          echo "⏱ Session will stay alive for $minutes minutes..."
          $interval = 30
          $elapsed = 0
          while ($elapsed -lt $seconds) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            $remaining = [math]::Round(($seconds - $elapsed) / 60, 1)
            echo "[$elapsed s elapsed] ~$remaining min remaining"
          }
          echo "🔴 Session ended."