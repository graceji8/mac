name: Windows Remote Dev (RDP + VNC + Pinggy)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          echo "✅ RDP enabled on port 3389"

      - name: Set RDP Password
        shell: powershell
        run: |
          net user runneradmin "P@ssw0rd!RDP2024"
          echo "✅ RDP ready | User: runneradmin | Pass: P@ssw0rd!RDP2024"

      - name: Install TightVNC Server
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          try {
            Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" -OutFile "tightvnc.msi" -TimeoutSec 60
            Start-Process msiexec -ArgumentList "/i tightvnc.msi /quiet ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_VNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=vnc1234 SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=admin1234" -Wait
            Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
            echo "✅ VNC started on port 5900"
          } catch {
            echo "⚠️ VNC skipped: $_"
          }

      - name: Start Pinggy Tunnel for RDP
        shell: powershell
        run: |
          # Generate SSH key silently to avoid password prompts
          if (-not (Test-Path "$env:USERPROFILE\.ssh\id_rsa")) {
            ssh-keygen -t rsa -b 2048 -f "$env:USERPROFILE\.ssh\id_rsa" -N '""' | Out-Null
          }

          # Start RDP tunnel in background
          $rdpJob = Start-Job -ScriptBlock {
            ssh -p 443 `
              -R "0:127.0.0.1:3389" `
              -o "StrictHostKeyChecking=no" `
              -o "ServerAliveInterval=30" `
              -o "ServerAliveCountMax=10" `
              -o "ExitOnForwardFailure=yes" `
              tcp@free.pinggy.io 2>&1
          }

          # Wait for tunnel URL to appear in output
          $rdpUrl = ""
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            $output = Receive-Job $rdpJob -Keep
            $line = $output | Where-Object { $_ -match "tcp://" } | Select-Object -Last 1
            if ($line -match "(tcp://[^\s]+)") {
              $rdpUrl = $matches[1]
              break
            }
          }

          echo "RDP_URL=$rdpUrl" >> $env:GITHUB_ENV
          echo "✅ RDP Tunnel: $rdpUrl"

      - name: Start Pinggy Tunnel for VNC
        shell: powershell
        run: |
          # Start VNC tunnel in background
          $vncJob = Start-Job -ScriptBlock {
            ssh -p 443 `
              -R "0:127.0.0.1:5900" `
              -o "StrictHostKeyChecking=no" `
              -o "ServerAliveInterval=30" `
              -o "ServerAliveCountMax=10" `
              tcp@free.pinggy.io 2>&1
          }

          # Wait for tunnel URL
          $vncUrl = ""
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            $output = Receive-Job $vncJob -Keep
            $line = $output | Where-Object { $_ -match "tcp://" } | Select-Object -Last 1
            if ($line -match "(tcp://[^\s]+)") {
              $vncUrl = $matches[1]
              break
            }
          }

          echo "VNC_URL=$vncUrl" >> $env:GITHUB_ENV
          echo "✅ VNC Tunnel: $vncUrl"

      - name: Print Connection Summary
        shell: powershell
        run: |
          # Parse RDP host and port
          if ($env:RDP_URL -match "tcp://([^:]+):(\d+)") {
            $rdpHost = $matches[1]
            $rdpPort = $matches[2]
          }
          if ($env:VNC_URL -match "tcp://([^:]+):(\d+)") {
            $vncHost = $matches[1]
            $vncPort = $matches[2]
          }

          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║           REMOTE ACCESS CONNECTION SUMMARY               ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  RDP (Microsoft Remote Desktop)"
          echo "║    Host : $rdpHost"
          echo "║    Port : $rdpPort"
          echo "║    User : runneradmin"
          echo "║    Pass : P@ssw0rd!RDP2024"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  VNC"
          echo "║    Host : $vncHost"
          echo "║    Port : $vncPort"
          echo "║    Pass : vnc1234"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  HOW TO CONNECT VIA RDP:"
          echo "║    Open: mstsc.exe"
          echo "║    Enter: $rdpHost`:$rdpPort"
          echo "╚══════════════════════════════════════════════════════════╝"

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ github.event.inputs.session_duration }}"
          if ($minutes -gt 350) { $minutes = 350 }
          $seconds = $minutes * 60
          $interval = 30
          $elapsed = 0
          echo "⏱ Session alive for $minutes minutes. Connect now!"
          while ($elapsed -lt $seconds) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            $remaining = [math]::Round(($seconds - $elapsed) / 60, 1)
            echo "[$elapsed s] ~$remaining min remaining | RDP: $env:RDP_URL"
          }
          echo "🔴 Session ended"