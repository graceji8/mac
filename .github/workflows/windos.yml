name: Windows Remote Dev (RDP + VNC + OpenVSCode)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Session Duration
        shell: powershell
        run: |
          $duration = [int]"${{ github.event.inputs.session_duration }}"
          if ($duration -gt 350) { $duration = 350 }
          echo "SESSION_MINUTES=$duration" >> $env:GITHUB_ENV
          echo "Session will run for $duration minutes"

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -name "UserAuthentication" -Value 1
          echo "✅ RDP enabled on port 3389"

      - name: Set RDP Password
        shell: powershell
        run: |
          $password = "P@ssw0rd!RDP2024"
          net user runneradmin $password
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          echo "✅ RDP credentials set | User: runneradmin | Pass: $password"

      - name: Install TightVNC Server
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" `
            -OutFile "tightvnc.msi"
          Start-Process msiexec -ArgumentList `
            "/i tightvnc.msi /quiet ADDLOCAL=Server `
            SET_USEVNCAUTHENTICATION=1 VALUE_OF_VNCAUTHENTICATION=1 `
            SET_PASSWORD=1 VALUE_OF_PASSWORD=vnc1234 `
            SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=admin1234" -Wait
          Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
          echo "✅ VNC Server started on port 5900 | Pass: vnc1234"

      - name: Install OpenVSCode Server
        shell: powershell
        run: |
          $version = "1.89.1"
          $url = "https://github.com/gitpod-io/openvscode-server/releases/download/openvscode-server-v$version/openvscode-server-v$version-win32-x64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "openvscode.tar.gz"
          tar -xzf "openvscode.tar.gz"
          $serverDir = "openvscode-server-v$version-win32-x64"
          Start-Process -FilePath "$serverDir\bin\openvscode-server.cmd" `
            -ArgumentList "--port 8080 --without-connection-token --host 0.0.0.0" `
            -NoNewWindow
          Start-Sleep -Seconds 5
          echo "✅ OpenVSCode Server started on port 8080 (no password needed)"

      - name: Install VS Code on Desktop
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://code.visualstudio.com/sha/download?build=stable&os=win32-x64-user" `
            -OutFile "vscode-installer.exe"
          Start-Process -FilePath "vscode-installer.exe" `
            -ArgumentList "/VERYSILENT /NORESTART /MERGETASKS=!runcode" -Wait
          echo "✅ VS Code installed on desktop (accessible via RDP)"

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.exe" `
            -OutFile "tailscale-setup.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5
          echo "✅ Tailscale installed"

      - name: Get Tailscale OAuth Token
        shell: powershell
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          $body = @{
            client_id     = $env:TS_OAUTH_CLIENT_ID
            client_secret = $env:TS_OAUTH_SECRET
            grant_type    = "client_credentials"
            scope         = "devices:write"
          }
          $response = Invoke-RestMethod `
            -Uri "https://api.tailscale.com/api/v2/oauth/token" `
            -Method POST `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $body
          $token = $response.access_token
          echo "TS_ACCESS_TOKEN=$token" >> $env:GITHUB_ENV
          echo "✅ Tailscale OAuth token obtained"

      - name: Connect to Tailscale
        shell: powershell
        run: |
          $tailscale = "C:\Program Files\Tailscale\tailscale.exe"
          & $tailscale up `
            --authkey=$env:TS_ACCESS_TOKEN `
            --hostname="github-runner-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false
          Start-Sleep -Seconds 10
          $ip = & $tailscale ip -4
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
          echo "✅ Connected to Tailscale | IP: $ip"

      - name: Print Connection Summary
        shell: powershell
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║           REMOTE ACCESS CONNECTION SUMMARY               ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Tailscale IP : $env:TAILSCALE_IP"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  RDP (Microsoft Remote Desktop)"
          echo "║    Host : $env:TAILSCALE_IP"
          echo "║    Port : 3389"
          echo "║    User : runneradmin"
          echo "║    Pass : P@ssw0rd!RDP2024"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  VNC"
          echo "║    Host : $env:TAILSCALE_IP:5900"
          echo "║    Pass : vnc1234"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  OpenVSCode Server (Browser IDE)"
          echo "║    URL  : http://$env:TAILSCALE_IP:8080"
          echo "║    Auth : none (open access via Tailscale)"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  NOTE: Install Tailscale on YOUR machine first!"
          echo "║  https://tailscale.com/download"
          echo "╚══════════════════════════════════════════════════════════╝"

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ github.event.inputs.session_duration }}"
          if ($minutes -gt 350) { $minutes = 350 }
          $seconds = $minutes * 60
          $interval = 30
          $elapsed = 0
          echo "⏱ Session alive for $minutes minutes. Connect now!"
          while ($elapsed -lt $seconds) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            $remaining = [math]::Round(($seconds - $elapsed) / 60, 1)
            $tailscale = "C:\Program Files\Tailscale\tailscale.exe"
            $status = & $tailscale status --json | ConvertFrom-Json
            echo "[$elapsed s] ~$remaining min left | Tailscale: $($status.BackendState)"
          }
          echo "🔴 Session ended."

      - name: Disconnect Tailscale
        if: always()
        shell: powershell
        run: |
          $tailscale = "C:\Program Files\Tailscale\tailscale.exe"
          & $tailscale logout
          echo "✅ Tailscale disconnected"