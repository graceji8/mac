name: Windows Remote Dev (RDP + VNC + OpenVSCode)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Session Duration
        shell: powershell
        run: |
          $duration = [int]"${{ github.event.inputs.session_duration }}"
          if ($duration -gt 350) { $duration = 350 }
          echo "SESSION_MINUTES=$duration" >> $env:GITHUB_ENV
          echo "Session will run for $duration minutes"

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -name "UserAuthentication" -Value 1
          echo "✅ RDP enabled on port 3389"

      - name: Set RDP Password
        shell: powershell
        run: |
          $password = "P@ssw0rd!RDP2024"
          net user runneradmin $password
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          echo "✅ RDP credentials set | User: runneradmin | Pass: $password"

      - name: Install TightVNC Server
        shell: powershell
        run: |
          # Try TightVNC first, fallback to skip if slow
          try {
            $ProgressPreference = 'SilentlyContinue'  # speeds up downloads massively
            Invoke-WebRequest `
              -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" `
              -OutFile "tightvnc.msi" `
              -TimeoutSec 60
            Start-Process msiexec -ArgumentList `
              "/i tightvnc.msi /quiet ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_VNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=vnc1234 SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=admin1234" -Wait
            Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
            echo "✅ VNC Server started on port 5900"
          } catch {
            echo "⚠️ VNC install skipped (timeout) - use RDP instead"
          }

      - name: Install OpenVSCode Server
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          try {
            # Fetch all releases and find win32-x64 asset
            $headers = @{ "User-Agent" = "GitHubActions" }
            for ($page = 1; $page -le 5; $page++) {
              $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/gitpod-io/openvscode-server/releases?per_page=10&page=$page" -Headers $headers
              foreach ($release in $releases) {
                $asset = $release.assets | Where-Object { $_.name -match "win32-x64\.tar\.gz$" } | Select-Object -First 1
                if ($asset) {
                  echo "Found: $($release.tag_name) → $($asset.name)"
                  Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "openvscode.tar.gz" -Headers $headers -TimeoutSec 180
                  tar -xzf "openvscode.tar.gz"
                  $serverDir = Get-ChildItem -Directory -Filter "openvscode-server-*" | Select-Object -First 1 -ExpandProperty FullName
                  Start-Process -FilePath "$serverDir\bin\openvscode-server.cmd" `
                    -ArgumentList "--port 8080 --without-connection-token --host 0.0.0.0" -NoNewWindow
                  Start-Sleep -Seconds 5
                  echo "✅ OpenVSCode Server started on port 8080"
                  exit 0
                }
              }
            }
            throw "No win32-x64 asset found in any release"
          } catch {
            echo "⚠️ OpenVSCode skipped: $_"
          }

      - name: Connect to Tailscale
        shell: powershell
        run: |
          $tailscale = $env:TAILSCALE_BIN
          echo "Tailscale binary: $tailscale"

          # Check tailscale service is running
          Start-Service -Name "Tailscale" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

          # Run tailscale up and capture output
          echo "Running tailscale up..."
          $output = & $tailscale up `
            --authkey=$env:TS_ACCESS_TOKEN `
            --hostname="github-runner-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false 2>&1
          echo "Output: $output"
          Start-Sleep -Seconds 15

          # Check status
          $status = & $tailscale status 2>&1
          echo "Status: $status"

          # Get IP
          $ip = & $tailscale ip -4 2>&1
          echo "IP result: $ip"

          if ($ip -match '\d+\.\d+\.\d+\.\d+') {
            echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
            echo "✅ Connected! Tailscale IP: $ip"
          } else {
            echo "❌ Failed to get IP. Full status:"
            & $tailscale status --json 2>&1
            exit 1
          }

      - name: Install Tailscale
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # Use official Tailscale GitHub Action approach - hardcoded stable version
          $version = "1.92.1"
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-${version}-amd64.msi"
          echo "Downloading Tailscale v$version..."
          try {
            Invoke-WebRequest -Uri $url -OutFile "tailscale.msi" -TimeoutSec 120
          } catch {
            # Fallback to exe installer
            echo "MSI failed, trying exe..."
            $url2 = "https://pkgs.tailscale.com/stable/tailscale-setup-${version}.exe"
            Invoke-WebRequest -Uri $url2 -OutFile "tailscale.exe" -TimeoutSec 120
            Start-Process -FilePath "tailscale.exe" -ArgumentList "/S" -Wait
            Start-Sleep -Seconds 8
            echo "TAILSCALE_BIN=tailscale" >> $env:GITHUB_ENV
            exit 0
          }
          Start-Process msiexec -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait
          Start-Sleep -Seconds 8
          $tailscale = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tailscale)) {
            $tailscale = (Get-Command tailscale -ErrorAction SilentlyContinue).Source
          }
          echo "TAILSCALE_BIN=$tailscale" >> $env:GITHUB_ENV
          echo "✅ Tailscale installed at: $tailscale"

      - name: Get Tailscale OAuth Token
        shell: powershell
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          $body = @{
            client_id     = $env:TS_OAUTH_CLIENT_ID
            client_secret = $env:TS_OAUTH_SECRET
            grant_type    = "client_credentials"
            scope         = "devices:write"
          }
          $response = Invoke-RestMethod `
            -Uri "https://api.tailscale.com/api/v2/oauth/token" `
            -Method POST `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $body
          echo "TS_ACCESS_TOKEN=$($response.access_token)" >> $env:GITHUB_ENV
          echo "✅ OAuth token obtained"

      - name: Connect to Tailscale
        shell: powershell
        run: |
          $tailscale = $env:TAILSCALE_BIN
          echo "Using Tailscale at: $tailscale"
          & $tailscale up `
            --authkey=$env:TS_ACCESS_TOKEN `
            --hostname="github-runner-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false
          Start-Sleep -Seconds 10
          $ip = & $tailscale ip -4
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
          echo "✅ Connected! Tailscale IP: $ip"

      - name: Print Connection Summary
        shell: powershell
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║        REMOTE ACCESS CONNECTION INFO         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  RDP  → $env:TAILSCALE_IP:3389"
          echo "║  User : runneradmin"
          echo "║  Pass : P@ssw0rd!RDP2024"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  VNC  → $env:TAILSCALE_IP:5900  Pass: vnc1234"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  IDE  → http://$env:TAILSCALE_IP:8080"
          echo "╚══════════════════════════════════════════════╝"

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ github.event.inputs.session_duration }}"
          if ($minutes -gt 350) { $minutes = 350 }
          $seconds = $minutes * 60
          $interval = 30
          $elapsed = 0
          echo "⏱ Session alive for $minutes minutes"
          while ($elapsed -lt $seconds) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            $remaining = [math]::Round(($seconds - $elapsed) / 60, 1)
            echo "[$elapsed s] ~$remaining min remaining"
          }
          echo "🔴 Session ended"

      - name: Disconnect Tailscale
        if: always()
        shell: powershell
        run: |
          if ($env:TAILSCALE_BIN -and (Test-Path $env:TAILSCALE_BIN)) {
            & $env:TAILSCALE_BIN logout
            echo "✅ Tailscale disconnected"
          }