name: Windows Remote Dev (RDP + VNC + Pinggy)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          echo "✅ RDP enabled"

      - name: Set RDP Password
        shell: powershell
        run: |
          net user runneradmin "P@ssw0rd!RDP2024"
          echo "✅ User: runneradmin | Pass: P@ssw0rd!RDP2024"

      - name: Install TightVNC Server
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          try {
            Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" -OutFile "tightvnc.msi" -TimeoutSec 60
            Start-Process msiexec -ArgumentList "/i tightvnc.msi /quiet ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_VNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=vnc1234 SET_CONTROLPASSWORD=1 VALUE_OF_CONTROLPASSWORD=admin1234" -Wait
            Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
            echo "✅ VNC started on port 5900"
          } catch {
            echo "⚠️ VNC skipped: $_"
          }

      - name: Start Pinggy Tunnels
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'

          # Create .ssh dir
          $sshDir = "$env:USERPROFILE\.ssh"
          New-Item -ItemType Directory -Path $sshDir -Force | Out-Null
          echo "✅ .ssh dir ready: $sshDir"

          # Disable strict host checking globally
          $sshConfig = "$sshDir\config"
          @"
Host free.pinggy.io
    StrictHostKeyChecking no
    UserKnownHostsFile NUL
    ServerAliveInterval 30
    ServerAliveCountMax 10
"@ | Out-File -FilePath $sshConfig -Encoding utf8

          # Start RDP tunnel
          $rdpLog = "C:\rdp.log"
          New-Item -ItemType File -Path $rdpLog -Force | Out-Null
          Start-Process -FilePath "ssh" `
            -ArgumentList "-p 443 -R 0:127.0.0.1:3389 tcp@free.pinggy.io" `
            -RedirectStandardOutput $rdpLog `
            -RedirectStandardError $rdpLog `
            -NoNewWindow
          echo "✅ RDP tunnel process started"

          # Wait for RDP URL
          $rdpUrl = ""
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 3
            $content = Get-Content $rdpLog -Raw -ErrorAction SilentlyContinue
            echo "RDP log [$i]: $content"
            if ($content -match "tcp://\S+") {
              $rdpUrl = $matches[0]
              break
            }
          }

          if (-not $rdpUrl) {
            echo "❌ Could not get RDP URL. Final log:"
            Get-Content $rdpLog
            exit 1
          }

          # Start VNC tunnel
          $vncLog = "C:\vnc.log"
          New-Item -ItemType File -Path $vncLog -Force | Out-Null
          Start-Process -FilePath "ssh" `
            -ArgumentList "-p 443 -R 0:127.0.0.1:5900 tcp@free.pinggy.io" `
            -RedirectStandardOutput $vncLog `
            -RedirectStandardError $vncLog `
            -NoNewWindow

          # Wait for VNC URL
          $vncUrl = ""
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 3
            $content = Get-Content $vncLog -Raw -ErrorAction SilentlyContinue
            if ($content -match "tcp://\S+") {
              $vncUrl = $matches[0]
              break
            }
          }

          "RDP_URL=$rdpUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VNC_URL=$vncUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          echo ""
          echo "✅ RDP: $rdpUrl"
          echo "✅ VNC: $vncUrl"

      - name: Print Connection Summary
        shell: powershell
        run: |
          if ($env:RDP_URL -match "tcp://([^:]+):(\d+)") {
            $rdpHost = $matches[1]; $rdpPort = $matches[2]
          }
          if ($env:VNC_URL -match "tcp://([^:]+):(\d+)") {
            $vncHost = $matches[1]; $vncPort = $matches[2]
          }
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║        REMOTE ACCESS CONNECTION INFO         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  RDP → Open 'Remote Desktop Connection'"
          echo "║    Host : $rdpHost"
          echo "║    Port : $rdpPort"
          echo "║    User : runneradmin"
          echo "║    Pass : P@ssw0rd!RDP2024"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  VNC → $vncHost`:$vncPort  Pass: vnc1234"
          echo "╚══════════════════════════════════════════════╝"

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ github.event.inputs.session_duration }}"
          if ($minutes -gt 350) { $minutes = 350 }
          $seconds = $minutes * 60
          $interval = 30
          $elapsed = 0
          echo "⏱ Session alive for $minutes minutes"
          while ($elapsed -lt $seconds) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            $remaining = [math]::Round(($seconds - $elapsed) / 60, 1)
            echo "[$elapsed s] ~$remaining min | RDP: $env:RDP_URL"
          }
          echo "🔴 Session ended"