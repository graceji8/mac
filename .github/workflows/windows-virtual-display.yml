name: Windows Remote Dev (noVNC + VS Code Server)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Enable RDP so TigerVNC can mirror the desktop session ──────────
      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Set a password on the runner user account
          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "Actions2024!" }
          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          net user $user $pass 2>&1 | Out-Null
          Write-Host "RDP enabled, user: $user"
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 2. Install TigerVNC WinVNC Server ───────────────────────────────────
      - name: Install TigerVNC Server
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # Dynamically fetch the latest release URL from GitHub API
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/TigerVNC/tigervnc/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "winvnc.*\.exe$" } | Select-Object -First 1
          if (!$asset) {
              Write-Warning "winvnc asset not found in latest release, trying fixed version..."
              $asset = $release.assets | Where-Object { $_.name -match "tigervnc.*\.exe$" } | Select-Object -First 1
          }
          if ($asset) {
              Write-Host "Downloading: $($asset.browser_download_url)"
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:TEMP\winvnc.exe"
              Start-Process "$env:TEMP\winvnc.exe" -ArgumentList "/silent" -Wait
              Write-Host "TigerVNC WinVNC installed"
          } else {
              Write-Warning "Could not find TigerVNC WinVNC asset. Available assets:"
              $release.assets | ForEach-Object { Write-Host "  - $($_.name)" }
              throw "TigerVNC WinVNC not found in latest release"
          }

      # ── 3. Configure TigerVNC via registry ────────────────────────────────
      - name: Configure & start TigerVNC
        shell: pwsh
        run: |
          $vncPass = if ($env:VNC_PASSWORD) { $env:VNC_PASSWORD } else { "vnc12345" }

          $reg = "HKLM:\SOFTWARE\TigerVNC\WinVNC4"
          if (-not (Test-Path $reg)) { New-Item -Path $reg -Force | Out-Null }

          # Encrypt password with vncpasswd.exe
          $passFile  = "$env:TEMP\vncpasswd.bin"
          $vncpasswd = "C:\Program Files\TigerVNC\vncpasswd.exe"
          if (Test-Path $vncpasswd) {
            $vncPass | & $vncpasswd -f | Set-Content $passFile -Encoding Byte
            Set-ItemProperty -Path $reg -Name "Password" `
              -Value ([System.IO.File]::ReadAllBytes($passFile))
          }

          Set-ItemProperty -Path $reg -Name "SecurityTypes"     -Value "VncAuth"
          Set-ItemProperty -Path $reg -Name "AlwaysShared"      -Value 1  -Type DWord
          Set-ItemProperty -Path $reg -Name "DisconnectClients" -Value 0  -Type DWord
          Set-ItemProperty -Path $reg -Name "LocalHost"         -Value 0  -Type DWord

          # Start WinVNC
          Start-Process "C:\Program Files\TigerVNC\winvnc4.exe" -WindowStyle Hidden
          Start-Sleep -Seconds 5

          $port = netstat -ano | Select-String ":5900"
          if ($port) { Write-Host "VNC listening on :5900" } else { Write-Host "VNC not yet on :5900" }
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}

      # ── 4. noVNC (HTML5 VNC viewer) via websockify ────────────────────────
      - name: Install websockify
        shell: pwsh
        run: pip install websockify --quiet

      - name: Clone noVNC
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          git clone --depth 1 https://github.com/novnc/noVNC.git "$env:TEMP\noVNC"

      - name: Start noVNC on port 6080
        shell: pwsh
        run: |
          $novnc = "$env:TEMP\noVNC"
          $log   = "$env:TEMP\websockify.log"
          Start-Process python `
            -ArgumentList "-m websockify --web `"$novnc`" 6080 localhost:5900" `
            -RedirectStandardOutput $log -RedirectStandardError $log `
            -WindowStyle Hidden
          Start-Sleep -Seconds 3
          Write-Host "noVNC running on :6080  ->  local: http://localhost:6080/vnc.html"

      # ── 5. VS Code Server (code-server) on port 8080 ──────────────────────
      - name: Install code-server
        shell: pwsh
        run: |
          npm install -g code-server 2>&1 | Select-Object -Last 3
          Write-Host "code-server $(code-server --version)"

      - name: Start code-server on port 8080
        shell: pwsh
        run: |
          $csPass  = if ($env:CODESERVER_PASSWORD) { $env:CODESERVER_PASSWORD } else { "code12345" }
          $log     = "$env:TEMP\codeserver.log"
          $env:PASSWORD = $csPass

          Start-Process code-server `
            -ArgumentList "--bind-addr 0.0.0.0:8080 --auth password --disable-telemetry `"$env:GITHUB_WORKSPACE`"" `
            -RedirectStandardOutput $log -RedirectStandardError $log `
            -WindowStyle Hidden
          Start-Sleep -Seconds 8
          Write-Host "code-server running on :8080"
        env:
          CODESERVER_PASSWORD: ${{ secrets.CODESERVER_PASSWORD }}

      # ── 6. Cloudflare Quick Tunnels (no account needed) ───────────────────
      - name: Install cloudflared
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest `
            -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" `
            -OutFile "$env:TEMP\cloudflared.exe"
          & "$env:TEMP\cloudflared.exe" --version

      - name: Start tunnels & print public URLs
        shell: pwsh
        run: |
          $cf = "$env:TEMP\cloudflared.exe"

          $logNovnc = "$env:TEMP\cf-novnc.log"
          $logCs    = "$env:TEMP\cf-cs.log"

          Start-Process $cf `
            -ArgumentList "tunnel --url http://localhost:6080 --no-autoupdate" `
            -RedirectStandardOutput $logNovnc -RedirectStandardError $logNovnc `
            -WindowStyle Hidden

          Start-Process $cf `
            -ArgumentList "tunnel --url http://localhost:8080 --no-autoupdate" `
            -RedirectStandardOutput $logCs -RedirectStandardError $logCs `
            -WindowStyle Hidden

          Write-Host "Waiting 20s for tunnels to connect..."
          Start-Sleep -Seconds 20

          function Get-URL($logPath) {
            $raw = Get-Content $logPath -Raw -ErrorAction SilentlyContinue
            if ($raw -match 'https://[a-z0-9\-]+\.trycloudflare\.com') { return $matches[0] }
            return "(not ready)"
          }

          $uNovnc = Get-URL $logNovnc
          $uCs    = Get-URL $logCs

          Write-Host ""
          Write-Host "========================================================"
          Write-Host "  noVNC  (Windows Desktop):  $uNovnc/vnc.html"
          Write-Host "  VS Code Server:             $uCs"
          Write-Host "--------------------------------------------------------"
          Write-Host "  Default VNC password:       vnc12345"
          Write-Host "  Default code-server pass:   code12345"
          Write-Host "  (Override with GitHub Secrets: VNC_PASSWORD, CODESERVER_PASSWORD)"
          Write-Host "========================================================"

      # ── 7. Keep runner alive ──────────────────────────────────────────────
      - name: Keep session alive
        shell: pwsh
        run: |
          $minutes  = [Math]::Min([int]"${{ github.event.inputs.session_duration }}", 340)
          $logNovnc = "$env:TEMP\cf-novnc.log"
          $logCs    = "$env:TEMP\cf-cs.log"

          function Get-URL($logPath) {
            $raw = Get-Content $logPath -Raw -ErrorAction SilentlyContinue
            if ($raw -match 'https://[a-z0-9\-]+\.trycloudflare\.com') { return $matches[0] }
            return "unknown"
          }

          Write-Host "Session running for $minutes minutes. Cancel job in Actions UI to stop early."
          $end = (Get-Date).AddMinutes($minutes)

          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 300
            $remaining = [Math]::Round(($end - (Get-Date)).TotalMinutes)
            Write-Host "[$([datetime]::Now.ToString('HH:mm'))] $remaining min remaining"
            Write-Host "  noVNC:       $(Get-URL $logNovnc)/vnc.html"
            Write-Host "  code-server: $(Get-URL $logCs)"
          }