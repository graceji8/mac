name: Windows Remote Dev (RDP + VNC + Code Server)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Enable RDP & Set Password ────────────────────────────────────────
      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          # Ensure registry paths exist and set properties
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -ErrorAction SilentlyContinue
          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0 -ErrorAction SilentlyContinue

          # Set password and show errors if any
          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "RunnerAdmin!123" }
          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          Write-Host "Setting password for user: $user"
          net user $user $pass
          
          Write-Host "RDP configuration applied. User: $user"
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 2. Install TigerVNC & noVNC ─────────────────────────────────────────
      - name: Install TigerVNC Server
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/TigerVNC/tigervnc/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "winvnc.*\.exe$" } | Select-Object -First 1
          if (!$asset) { $asset = $release.assets | Where-Object { $_.name -match "tigervnc.*\.exe$" } | Select-Object -First 1 }
          if ($asset) {
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:TEMP\winvnc.exe"
              Start-Process "$env:TEMP\winvnc.exe" -ArgumentList "/silent" -Wait
          }

      - name: Configure & Start TigerVNC
        shell: pwsh
        run: |
          $vncPass = if ($env:VNC_PASSWORD) { $env:VNC_PASSWORD } else { "vnc12345" }
          $reg = "HKLM:\SOFTWARE\TigerVNC\WinVNC4"
          if (-not (Test-Path $reg)) { New-Item -Path $reg -Force | Out-Null }
          $passFile = "$env:TEMP\vncpasswd.bin"
          $vncpasswd = "C:\Program Files\TigerVNC\vncpasswd.exe"
          if (Test-Path $vncpasswd) {
            $vncPass | & $vncpasswd -f | Set-Content $passFile -Encoding Byte
            Set-ItemProperty -Path $reg -Name "Password" -Value ([System.IO.File]::ReadAllBytes($passFile))
          }
          Set-ItemProperty -Path $reg -Name "SecurityTypes" -Value "VncAuth"
          Set-ItemProperty -Path $reg -Name "AlwaysShared" -Value 1 -Type DWord
          Start-Process "C:\Program Files\TigerVNC\winvnc4.exe" -WindowStyle Hidden
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}

      - name: Setup noVNC
        shell: pwsh
        run: |
          pip install websockify --quiet
          git clone --depth 1 https://github.com/novnc/noVNC.git "$env:TEMP\noVNC"
          Start-Process python -ArgumentList "-m websockify --web `"$env:TEMP\noVNC`" 6080 localhost:5900" -RedirectStandardOutput "$env:TEMP\websockify.log" -RedirectStandardError "$env:TEMP\websockify.log" -WindowStyle Hidden

      # ── 3. Install & Start code-server ──────────────────────────────────────
      - name: Setup code-server
        shell: pwsh
        run: |
          npm install -g code-server 2>&1 | Select-Object -Last 3
          $csPass = if ($env:CODESERVER_PASSWORD) { $env:CODESERVER_PASSWORD } else { "code12345" }
          $env:PASSWORD = $csPass
          Start-Process code-server -ArgumentList "--bind-addr 0.0.0.0:8080 --auth password --disable-telemetry `"$env:GITHUB_WORKSPACE`"" -RedirectStandardOutput "$env:TEMP\codeserver.log" -RedirectStandardError "$env:TEMP\codeserver.log" -WindowStyle Hidden
        env:
          CODESERVER_PASSWORD: ${{ secrets.CODESERVER_PASSWORD }}

      # ── 4. Cloudflared Tunnels ──────────────────────────────────────────────
      - name: Start Cloudflared Tunnels
        shell: pwsh
        run: |
          $cf = "$env:TEMP\cloudflared.exe"
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cf
          Start-Process $cf -ArgumentList "tunnel --url http://localhost:6080 --no-autoupdate" -RedirectStandardOutput "$env:TEMP\cf-novnc.log" -RedirectStandardError "$env:TEMP\cf-novnc.log" -WindowStyle Hidden
          Start-Process $cf -ArgumentList "tunnel --url http://localhost:8080 --no-autoupdate" -RedirectStandardOutput "$env:TEMP\cf-cs.log" -RedirectStandardError "$env:TEMP\cf-cs.log" -WindowStyle Hidden

      # ── 5. Pinggy TCP Tunnel (RDP) ──────────────────────────────────────────
      - name: Start Pinggy Tunnel
        shell: pwsh
        run: |
          $logRdp = "$env:TEMP\pinggy_rdp.log"
          $rdpJob = Start-Job -ScriptBlock {
              param($log)
              & ssh -4 -o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 tcp@a.pinggy.io 2>&1 | ForEach-Object { Add-Content -Path $log -Value $_ }
          } -ArgumentList $logRdp

      # ── 6. Summary & Connection Details ─────────────────────────────────────
      - name: Connection Summary
        shell: pwsh
        run: |
          Write-Host "Waiting 30s for tunnels..."
          Start-Sleep -Seconds 30
          
          function Get-CF-URL($log) {
            $raw = Get-Content $log -Raw -ErrorAction SilentlyContinue
            if ($raw -match 'https://[a-z0-9\-]+\.trycloudflare\.com') { return $matches[0] }
            return "(probing...)"
          }

          $uNovnc = Get-CF-URL "$env:TEMP\cf-novnc.log"
          $uCs    = Get-CF-URL "$env:TEMP\cf-cs.log"
          $rdpAddr = Select-String -Path "$env:TEMP\pinggy_rdp.log" -Pattern "tcp://[^ ]*\.(pgy\.in|pinggy\.link|pinggy\.io):[0-9]+" | ForEach-Object { $_.Matches.Value } | Select-Object -First 1
          
          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "RunnerAdmin123!" }

          Write-Host "========================================================"
          Write-Host "  RDP (Direct):      $rdpAddr"
          Write-Host "  noVNC (Browser):   $uNovnc/vnc.html"
          Write-Host "  Code Server:       $uCs"
          Write-Host "  RDP/Windows User:  $user"
          Write-Host "  RDP/Windows Pass:  $pass"
          Write-Host "  VNC/Code Password: vnc12345 / code12345 (defaults)"
          Write-Host "========================================================"

          # Save to file for tracking
          "RDP_ADDRESS=$rdpAddr`r`nnoVNC_URL=$uNovnc/vnc.html`r`nCODESERVER_URL=$uCs`r`nUSER=$user" | Out-File ssh_connection.txt -Encoding utf8
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh_connection.txt
          git commit -m "Update connection details [skip ci]" --allow-empty
          git push origin HEAD:main
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 7. Keep Session Alive ───────────────────────────────────────────────
      - name: Keep session alive
        shell: pwsh
        run: |
          $minutes = [Math]::Min([int]"${{ github.event.inputs.session_duration }}", 340)
          $end = (Get-Date).AddMinutes($minutes)
          while ((Get-Date) -lt $end) {
              $rem = [Math]::Round(($end - (Get-Date)).TotalMinutes)
              Write-Host "[$([datetime]::Now.ToString('HH:mm'))] $rem min remaining"
              Start-Sleep -Seconds 300
          }
