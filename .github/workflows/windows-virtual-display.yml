name: Windows Remote Dev (RDP + VNC + Code Server)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Enable RDP & Set Password ────────────────────────────────────────
      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -ErrorAction SilentlyContinue
          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0 -ErrorAction SilentlyContinue

          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "Admin@Runner_2026_Complex!" }
          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          Write-Host "Setting password for user: $user"
          net user $user $pass
          
          Write-Host "RDP configuration applied. User: $user"
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 2. Install & Start TightVNC ─────────────────────────────────────────
      - name: Setup TightVNC
        shell: pwsh
        run: |
          Write-Host "Installing TightVNC via winget..."
          winget install GlavSoft.TightVNC --accept-source-agreements --accept-package-agreements
          
          $vncExe = Get-ChildItem -Path "$env:ProgramFiles\TightVNC", "${env:ProgramFiles(x86)}\TightVNC" -Filter "tvnserver.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
          
          if (-not $vncExe) {
              $vncExe = Get-ChildItem -Path "C:\" -Filter "tvnserver.exe" -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
          }

          if (-not $vncExe) { throw "TightVNC installation failed - tvnserver.exe not found" }
          Write-Host "TightVNC found at: $vncExe"

          $reg = "HKLM:\SOFTWARE\TightVNC\Server"
          if (-not (Test-Path $reg)) { New-Item -Path $reg -Force | Out-Null }
          
          Set-ItemProperty -Path $reg -Name "AcceptSetPassword" -Value 1 -Type DWord
          Set-ItemProperty -Path $reg -Name "AlwaysShared" -Value 1 -Type DWord
          Set-ItemProperty -Path $reg -Name "SecurityTypes" -Value 1 -Type DWord
          Set-ItemProperty -Path $reg -Name "UseVncAuthentication" -Value 0 -Type DWord

          Write-Host "Starting TightVNC..."
          Start-Process $vncExe -ArgumentList "-run" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: Setup noVNC
        shell: pwsh
        run: |
          pip install websockify --quiet
          git clone --depth 1 https://github.com/novnc/noVNC.git "$env:TEMP\noVNC"
          Start-Process python -ArgumentList "-m websockify --web `"$env:TEMP\noVNC`" 6080 localhost:5900" -RedirectStandardOutput "$env:TEMP\websockify.out.log" -RedirectStandardError "$env:TEMP\websockify.err.log" -WindowStyle Hidden

      # ── 3. Install & Start code-server ──────────────────────────────────────
      - name: Setup code-server
        shell: pwsh
        run: |
          $csDir = Join-Path $env:RUNNER_TEMP "cs-install"
          if (!(Test-Path $csDir)) { New-Item -ItemType Directory -Path $csDir }
          
          Write-Host "Installing code-server locally in $csDir..."
          Set-Location $csDir
          npm install code-server --no-save --quiet
          
          $binDir = Join-Path $csDir "node_modules\.bin"
          $csShim = Join-Path $binDir "code-server.cmd"
          if (-not (Test-Path $csShim)) { $csShim = Join-Path $binDir "code-server.ps1" }
          if (-not (Test-Path $csShim)) { $csShim = Join-Path $binDir "code-server" }
          
          if (-not (Test-Path $csShim)) { throw "code-server installation failed - shim not found in $binDir" }
          Write-Host "code-server shim found at: $csShim"

          $csPass = if ($env:CODESERVER_PASSWORD) { $env:CODESERVER_PASSWORD } else { "code12345" }
          $env:PASSWORD = $csPass
          
          $args = "--bind-addr 127.0.0.1:8080 --auth password --disable-telemetry `"$env:GITHUB_WORKSPACE`""
          
          Write-Host "Starting code-server..."
          if ($csShim.EndsWith(".cmd")) {
              Start-Process cmd -ArgumentList "/c", "`"$csShim`" $args" -RedirectStandardOutput "$env:TEMP\codeserver.out.log" -RedirectStandardError "$env:TEMP\codeserver.err.log" -WindowStyle Hidden
          } elseif ($csShim.EndsWith(".ps1")) {
              Start-Process powershell -ArgumentList "-ExecutionPolicy Bypass -File `"$csShim`" $args" -RedirectStandardOutput "$env:TEMP\codeserver.out.log" -RedirectStandardError "$env:TEMP\codeserver.err.log" -WindowStyle Hidden
          } else {
              Start-Process cmd -ArgumentList "/c node `"$csShim`" $args" -RedirectStandardOutput "$env:TEMP\codeserver.out.log" -RedirectStandardError "$env:TEMP\codeserver.err.log" -WindowStyle Hidden
          }
          
          Set-Location $env:GITHUB_WORKSPACE
        env:
          CODESERVER_PASSWORD: ${{ secrets.CODESERVER_PASSWORD }}

      # ── 4. Pinggy Tunnels (noVNC + Code Server + RDP) ───────────────────────
      - name: Start Pinggy Tunnels
        shell: pwsh
        run: |
          # noVNC (HTTP tunnel on port 6080)
          Start-Process ssh -ArgumentList "-T -4 -o StrictHostKeyChecking=no -p 443 -R 0:localhost:6080 a.pinggy.io" `
            -RedirectStandardOutput "$env:TEMP\pinggy_novnc.log" `
            -RedirectStandardError "$env:TEMP\pinggy_novnc_err.log" `
            -WindowStyle Hidden

          # Code Server (HTTP tunnel on port 8080)
          Start-Process ssh -ArgumentList "-T -4 -o StrictHostKeyChecking=no -p 443 -R 0:localhost:8080 a.pinggy.io" `
            -RedirectStandardOutput "$env:TEMP\pinggy_cs.log" `
            -RedirectStandardError "$env:TEMP\pinggy_cs_err.log" `
            -WindowStyle Hidden

          # RDP (TCP tunnel on port 3389)
          Start-Process ssh -ArgumentList "-T -4 -o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 tcp@a.pinggy.io" `
            -RedirectStandardOutput "$env:TEMP\pinggy_rdp.log" `
            -RedirectStandardError "$env:TEMP\pinggy_rdp_err.log" `
            -WindowStyle Hidden

      # ── 5. Connection Summary ────────────────────────────────────────────────
      - name: Connection Summary
        shell: pwsh
        run: |
          Write-Host "Waiting for tunnel URLs to initialize..."
          $uNovnc  = "(probing...)"
          $uCs     = "(probing...)"
          $rdpAddr = "(probing...)"

          for ($i = 0; $i -lt 15; $i++) {
            # noVNC URL
            if ($uNovnc -eq "(probing...)") {
              $raw = Get-Content "$env:TEMP\pinggy_novnc.log", "$env:TEMP\pinggy_novnc_err.log" -Raw -ErrorAction SilentlyContinue
              if ($raw -match 'https?://[a-z0-9\-]+\.(a\.pinggy\.io|pinggy\.link|pgy\.in)(:[0-9]+)?') { $uNovnc = $Matches[0] }
            }

            # Code Server URL
            if ($uCs -eq "(probing...)") {
              $raw = Get-Content "$env:TEMP\pinggy_cs.log", "$env:TEMP\pinggy_cs_err.log" -Raw -ErrorAction SilentlyContinue
              if ($raw -match 'https?://[a-z0-9\-]+\.(a\.pinggy\.io|pinggy\.link|pgy\.in)(:[0-9]+)?') { $uCs = $Matches[0] }
            }

            # RDP TCP address
            if ($rdpAddr -eq "(probing...)") {
              $paths = @("$env:TEMP\pinggy_rdp.log","$env:TEMP\pinggy_rdp_err.log") | Where-Object { Test-Path $_ }
              if ($paths) {
                $m = Select-String -Path $paths -Pattern "tcp://[^ ]*\.(pgy\.in|pinggy\.link|pinggy\.io):[0-9]+" -ErrorAction SilentlyContinue
                if ($m) { $rdpAddr = $m.Matches.Value | Select-Object -First 1 }
              }
            }

            if ($uNovnc -ne "(probing...)" -and $uCs -ne "(probing...)" -and $rdpAddr -ne "(probing...)") { break }
            Start-Sleep -Seconds 5
            Write-Host "  Retrying URL extraction ($($i+1)/15)..."
          }

          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "Admin@Runner_2026_Complex!" }

          Write-Host "========================================================"
          Write-Host "  RDP (Direct):      $rdpAddr"
          Write-Host "  noVNC (Browser):   $uNovnc/vnc.html"
          Write-Host "  Code Server:       $uCs"
          Write-Host "  RDP/Windows User:  $user"
          Write-Host "  RDP/Windows Pass:  $pass"
          Write-Host "  Code Password:     code12345 (default)"
          Write-Host "  VNC:               No password (auth disabled)"
          Write-Host "========================================================"

          "RDP_ADDRESS=$rdpAddr`r`nnoVNC_URL=$uNovnc/vnc.html`r`nCODESERVER_URL=$uCs`r`nUSER=$user" | Out-File ssh_connection.txt -Encoding utf8
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh_connection.txt
          git commit -m "Update connection details [skip ci]" --allow-empty
          git push origin HEAD:main
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 6. Debug Logs ────────────────────────────────────────────────────────
      - name: Debug Logs
        if: always()
        shell: pwsh
        run: |
          foreach ($log in @("pinggy_novnc.log","pinggy_novnc_err.log","pinggy_cs.log","pinggy_cs_err.log","pinggy_rdp.log","pinggy_rdp_err.log","codeserver.out.log","codeserver.err.log")) {
            $path = "$env:TEMP\$log"
            Write-Host "`n--- $log ---"
            if (Test-Path $path) { Get-Content $path } else { Write-Host "(not found)" }
          }

      # ── 7. Keep Session Alive ────────────────────────────────────────────────
      - name: Keep session alive
        shell: pwsh
        run: |
          $minutes = [Math]::Min([int]"${{ github.event.inputs.session_duration }}", 340)
          $end = (Get-Date).AddMinutes($minutes)

          while ((Get-Date) -lt $end) {
            $rem  = [Math]::Round(($end - (Get-Date)).TotalMinutes)
            $time = (Get-Date).ToString("HH:mm")

            $rawN = Get-Content "$env:TEMP\pinggy_novnc.log","$env:TEMP\pinggy_novnc_err.log" -Raw -ErrorAction SilentlyContinue
            $uNovnc = if ($rawN -match 'https?://[a-z0-9\-]+\.(a\.pinggy\.io|pinggy\.link|pgy\.in)(:[0-9]+)?') { $Matches[0] } else { "(probing...)" }

            $rawC = Get-Content "$env:TEMP\pinggy_cs.log","$env:TEMP\pinggy_cs_err.log" -Raw -ErrorAction SilentlyContinue
            $uCs = if ($rawC -match 'https?://[a-z0-9\-]+\.(a\.pinggy\.io|pinggy\.link|pgy\.in)(:[0-9]+)?') { $Matches[0] } else { "(probing...)" }

            $paths = @("$env:TEMP\pinggy_rdp.log","$env:TEMP\pinggy_rdp_err.log") | Where-Object { Test-Path $_ }
            $rdp = "(probing...)"
            if ($paths) {
              $m = Select-String -Path $paths -Pattern "tcp://[^ ]*\.(pgy\.in|pinggy\.link|pinggy\.io):[0-9]+" -ErrorAction SilentlyContinue
              if ($m) { $rdp = $m.Matches.Value | Select-Object -First 1 }
            }

            Write-Host "[$time] $rem min left | RDP: $rdp | VNC: $uNovnc | CS: $uCs"
            Start-Sleep -Seconds 120
          }