name: Windows Remote Dev (RDP + VNC + Code Server)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Session duration in minutes (max 350)"
        required: false
        default: "60"

jobs:
  remote-desktop:
    runs-on: windows-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Enable RDP & Set Password ────────────────────────────────────────
      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          # Ensure registry paths exist and set properties
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -ErrorAction SilentlyContinue
          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0 -ErrorAction SilentlyContinue

          # Set password and show errors if any
          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "Admin@Runner_2026_Complex!" }
          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          Write-Host "Setting password for user: $user"
          net user $user $pass
          
          Write-Host "RDP configuration applied. User: $user"
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 2. Install & Start TightVNC ─────────────────────────────────────────
      - name: Setup TightVNC
        shell: pwsh
        run: |
          Write-Host "Installing TightVNC via winget..."
          winget install GlavSoft.TightVNC --accept-source-agreements --accept-package-agreements
          
          # Dynamic discovery of tvnserver.exe
          $vncExe = Get-ChildItem -Path "$env:ProgramFiles\TightVNC", "${env:ProgramFiles(x86)}\TightVNC" -Filter "tvnserver.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
          
          if (-not $vncExe) {
              Write-Host "TightVNC not found in Program Files. Searching C:\..."
              $vncExe = Get-ChildItem -Path "C:\" -Filter "tvnserver.exe" -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
          }

          if (-not $vncExe) { throw "TightVNC installation failed - tvnserver.exe not found" }
          Write-Host "TightVNC found at: $vncExe"

          # Configure via Registry (TightVNC Server)
          $vncPass = if ($env:VNC_PASSWORD) { $env:VNC_PASSWORD } else { "vnc12345" }
          $reg = "HKLM:\SOFTWARE\TightVNC\Server"
          if (-not (Test-Path $reg)) { New-Item -Path $reg -Force | Out-Null }
          
          # Basic settings to allow connections
          Set-ItemProperty -Path $reg -Name "AcceptSetPassword" -Value 1 -Type DWord
          Set-ItemProperty -Path $reg -Name "AlwaysShared" -Value 1 -Type DWord

          # Start TightVNC
          Write-Host "Starting TightVNC..."
          Start-Process $vncExe -ArgumentList "-run" -WindowStyle Hidden
          Start-Sleep -Seconds 5
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}

      - name: Setup noVNC
        shell: pwsh
        run: |
          pip install websockify --quiet
          git clone --depth 1 https://github.com/novnc/noVNC.git "$env:TEMP\noVNC"
          Start-Process python -ArgumentList "-m websockify --web `"$env:TEMP\noVNC`" 6080 localhost:5900" -RedirectStandardOutput "$env:TEMP\websockify.out.log" -RedirectStandardError "$env:TEMP\websockify.err.log" -WindowStyle Hidden

      # ── 3. Install & Start code-server ──────────────────────────────────────
      - name: Setup code-server
        shell: pwsh
        run: |
          $csDir = Join-Path $env:RUNNER_TEMP "cs-install"
          if (!(Test-Path $csDir)) { New-Item -ItemType Directory -Path $csDir }
          
          Write-Host "Installing code-server locally in $csDir..."
          Set-Location $csDir
          # Install locally to avoid EBUSY on global prefix
          npm install code-server --no-save --quiet
          
          $binDir = Join-Path $csDir "node_modules\.bin"
          $shims = Get-ChildItem -Path $binDir -Filter "code-server*"
          
          # Prioritize shims that Windows can execute natively
          $csShim = ($shims | Where-Object { $_.Extension -eq ".cmd" } | Select-Object -ExpandProperty FullName -First 1)
          if (-not $csShim) {
              $csShim = ($shims | Where-Object { $_.Extension -eq ".ps1" } | Select-Object -ExpandProperty FullName -First 1)
          }
          if (-not $csShim) {
              $csShim = ($shims | Select-Object -ExpandProperty FullName -First 1)
          }
          
          if (-not $csShim) { throw "code-server installation failed - shim not found in $binDir" }
          Write-Host "code-server shim found at: $csShim"

          $csPass = if ($env:CODESERVER_PASSWORD) { $env:CODESERVER_PASSWORD } else { "code12345" }
          $env:PASSWORD = $csPass
          
          $args = "--bind-addr 0.0.0.0:8080 --auth password --disable-telemetry `"$env:GITHUB_WORKSPACE`""
          
          if ($csShim.EndsWith(".ps1")) {
              Write-Host "Starting code-server (PS1) via powershell..."
              Start-Process powershell -ArgumentList "-ExecutionPolicy Bypass -File `"$csShim`" $args" -RedirectStandardOutput "$env:TEMP\codeserver.out.log" -RedirectStandardError "$env:TEMP\codeserver.err.log" -WindowStyle Hidden
          } elseif ($csShim.EndsWith(".cmd")) {
              Write-Host "Starting code-server (CMD) via cmd /c..."
              Start-Process cmd -ArgumentList "/c", "`"$csShim`" $args" -RedirectStandardOutput "$env:TEMP\codeserver.out.log" -RedirectStandardError "$env:TEMP\codeserver.err.log" -WindowStyle Hidden
          } else {
              Write-Host "Starting code-server (Direct)..."
              Start-Process $csShim -ArgumentList $args -RedirectStandardOutput "$env:TEMP\codeserver.out.log" -RedirectStandardError "$env:TEMP\codeserver.err.log" -WindowStyle Hidden
          }
          
          Set-Location $env:GITHUB_WORKSPACE
        env:
          CODESERVER_PASSWORD: ${{ secrets.CODESERVER_PASSWORD }}

      # ── 4. Cloudflared Tunnels ──────────────────────────────────────────────
      - name: Start Cloudflared Tunnels
        shell: pwsh
        run: |
          $cf = "$env:TEMP\cloudflared.exe"
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cf
          Start-Process $cf -ArgumentList "tunnel --url http://localhost:6080 --no-autoupdate" -RedirectStandardOutput "$env:TEMP\cf-novnc.out.log" -RedirectStandardError "$env:TEMP\cf-novnc.err.log" -WindowStyle Hidden
          Start-Process $cf -ArgumentList "tunnel --url http://localhost:8080 --no-autoupdate" -RedirectStandardOutput "$env:TEMP\cf-cs.out.log" -RedirectStandardError "$env:TEMP\cf-cs.err.log" -WindowStyle Hidden

      # ── 5. Pinggy TCP Tunnel (RDP) ──────────────────────────────────────────
      - name: Start Pinggy Tunnel
        shell: pwsh
        run: |
          $logRdp = "$env:TEMP\pinggy_rdp.log"
          $rdpJob = Start-Job -ScriptBlock {
              param($log)
              & ssh -4 -o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 tcp@a.pinggy.io 2>&1 | ForEach-Object { Add-Content -Path $log -Value $_ }
          } -ArgumentList $logRdp

      # ── 6. Summary & Connection Details ─────────────────────────────────────
      - name: Connection Summary
        shell: pwsh
        run: |
          Write-Host "Waiting for tunnel URLs to initialize..."
          $uNovnc = "(probing...)"
          $uCs    = "(probing...)"
          $rdpAddr = "(probing...)"
          
          $logNovnc = "$env:TEMP\cf-novnc.out.log"
          $logCs    = "$env:TEMP\cf-cs.out.log"
          $logPinggy = "$env:TEMP\pinggy_rdp.log"
          if (!(Test-Path $logPinggy)) { New-Item -ItemType File -Path $logPinggy -Force | Out-Null }

          for ($i = 0; $i -lt 15; $i++) {
            if ($uNovnc -eq "(probing...)" -and (Get-Content $logNovnc -Raw -ErrorAction SilentlyContinue -match 'https://[a-z0-9\-]+\.trycloudflare\.com')) { $uNovnc = $Matches[0] }
            if ($uCs -eq "(probing...)" -and (Get-Content $logCs -Raw -ErrorAction SilentlyContinue -match 'https://[a-z0-9\-]+\.trycloudflare\.com')) { $uCs = $Matches[0] }
            if ($rdpAddr -eq "(probing...)") {
                $m = Select-String -Path $logPinggy -Pattern "tcp://[^ ]*\.(pgy\.in|pinggy\.link|pinggy\.io):[0-9]+" -ErrorAction SilentlyContinue
                if ($m) { $rdpAddr = $m.Matches.Value | Select-Object -First 1 }
            }
            
            if ($uNovnc -ne "(probing...)" -and $uCs -ne "(probing...)" -and $rdpAddr -ne "(probing...)") { break }
            Start-Sleep -Seconds 5
            Write-Host "  Retrying URL extraction ($($i+1)/15)..."
          }
          
          $user = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $pass = if ($env:SESSION_PASSWORD) { $env:SESSION_PASSWORD } else { "Admin@Runner_2026_Complex!" }

          Write-Host "========================================================"
          Write-Host "  RDP (Direct):      $rdpAddr"
          Write-Host "  noVNC (Browser):   $uNovnc/vnc.html"
          Write-Host "  Code Server:       $uCs"
          Write-Host "  RDP/Windows User:  $user"
          Write-Host "  RDP/Windows Pass:  $pass"
          Write-Host "  VNC/Code Password: vnc12345 / code12345 (defaults)"
          Write-Host "========================================================"

          # Save to file for tracking
          "RDP_ADDRESS=$rdpAddr`r`nnoVNC_URL=$uNovnc/vnc.html`r`nCODESERVER_URL=$uCs`r`nUSER=$user" | Out-File ssh_connection.txt -Encoding utf8
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh_connection.txt
          git commit -m "Update connection details [skip ci]" --allow-empty
          git push origin HEAD:main
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}

      # ── 7. Keep Session Alive ───────────────────────────────────────────────
      - name: Keep session alive
        shell: pwsh
        run: |
          $minutes = [Math]::Min([int]"${{ github.event.inputs.session_duration }}", 340)
          $end = (Get-Date).AddMinutes($minutes)
          
          $logNovnc = "$env:TEMP\cf-novnc.out.log"
          $logCs    = "$env:TEMP\cf-cs.out.log"
          $logPinggy = "$env:TEMP\pinggy_rdp.log"

          while ((Get-Date) -lt $end) {
              $rem = [Math]::Round(($end - (Get-Date)).TotalMinutes)
              $time = (Get-Date).ToString("HH:mm")
              
              # Periodically report URLs in case they were missed by the summary step
              $uNovnc = if (Get-Content $logNovnc -Raw -ErrorAction SilentlyContinue -match 'https://[a-z0-9\-]+\.trycloudflare\.com') { $Matches[0] } else { "(probing...)" }
              $uCs    = if (Get-Content $logCs -Raw -ErrorAction SilentlyContinue -match 'https://[a-z0-9\-]+\.trycloudflare\.com') { $Matches[0] } else { "(probing...)" }
              $rdp    = (Select-String -Path $logPinggy -Pattern "tcp://[^ ]*\.(pgy\.in|pinggy\.link|pinggy\.io):[0-9]+" -ErrorAction SilentlyContinue | ForEach-Object { $_.Matches.Value } | Select-Object -First 1)
              if (!$rdp) { $rdp = "(probing...)" }

              Write-Host "[$time] $rem min left | RDP: $rdp | VNC: $uNovnc | CS: $uCs"
              Start-Sleep -Seconds 120
          }
