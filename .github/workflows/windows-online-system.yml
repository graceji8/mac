name: windows-system-automation

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable VNC/NoMachine for monitoring and VS Code server'
        required: false
        default: true
        type: boolean

jobs:
  windows-system:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create session directories
        run: |
          mkdir -p .vscode-session/data
          mkdir -p .vscode-session/extensions
          mkdir -p logs

      - name: Setup Virtual Display & Remote Access
        shell: powershell
        run: |
          ./scripts/setup_windows_desktop.ps1

      - name: Install System Dependencies
        shell: powershell
        run: |
          # Install tunneling tools
          winget install --id Cloudflare.cloudflared --exact --accept-package-agreements --accept-source-agreements --silent

          Write-Host "Installing VS Code..."
          winget install --id Microsoft.VisualStudioCode --exact --accept-package-agreements --accept-source-agreements --silent
          # Refresh PATH so 'code' is available in subsequent steps
          $env:PATH = [System.Environment]::GetEnvironmentVariable('PATH', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('PATH', 'User')
          Write-Host "code.exe location: $(Get-Command code.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)"

      - name: Setup Tailscale
        if: env.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Start Services & Tunnels
        shell: powershell
        run: |
          # Create logs directory if it doesn't exist
          if (!(Test-Path "logs")) { New-Item -ItemType Directory -Path "logs" }

          # Start VS Code Tunnel - creates a browser-accessible IDE at https://vscode.dev/tunnel/mac-runner
          # Requires GitHub device auth on first run (prints device code to log)
          $env:VSCODE_CLI_USE_FILE_KEYCHAIN = "1"
          # Refresh PATH so winget-installed code.exe is found
          $env:PATH = [System.Environment]::GetEnvironmentVariable('PATH', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('PATH', 'User')
          $codePath = Get-Command code.cmd -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (!$codePath) { $codePath = "${env:LOCALAPPDATA}\Programs\Microsoft VS Code\bin\code.cmd" }
          if (!$codePath) { $codePath = "C:\Program Files\Microsoft VS Code\bin\code.cmd" }
          Write-Host "Using code at: $codePath"
          try {
              Start-Process cmd -ArgumentList "/c", "`"$codePath`" tunnel --accept-server-license-terms --name mac-runner >> logs\vscode_tunnel.log 2>&1" -NoNewWindow
              Write-Host "VS Code tunnel starting... URL: https://vscode.dev/tunnel/mac-runner"
              Start-Sleep -Seconds 8
          } catch {
              Write-Host "VS Code tunnel failed to start: $_"
          }
          # Show VS Code tunnel log for debug
          if (Test-Path "logs/vscode_tunnel.log") { Get-Content "logs/vscode_tunnel.log" }
          
          # Setup SSH Tunnel via Pinggy using .NET async output reading
          # This is the only reliable way to capture both stdout+stderr from a long-running process in PowerShell
          $logFile = "logs/pinggy_ssh.log"
          "" | Out-File $logFile  # Pre-create empty log file

          $pinfo = New-Object System.Diagnostics.ProcessStartInfo
          $pinfo.FileName = "ssh"
          $pinfo.Arguments = "-4 -o StrictHostKeyChecking=no -p 443 -R 0:localhost:22 tcp@a.pinggy.io"
          $pinfo.RedirectStandardOutput = $true
          $pinfo.RedirectStandardError = $true
          $pinfo.UseShellExecute = $false
          $pinfo.CreateNoWindow = $true

          $proc = New-Object System.Diagnostics.Process
          $proc.StartInfo = $pinfo

          # Event handler appends both streams to the same log file
          $sshLogPath = (Get-Item .).FullName + "\logs\pinggy_ssh.log"
          $onData = [System.Diagnostics.DataReceivedEventHandler] {
              param($s, $e)
              if ($e.Data) { Add-Content -Path $using:sshLogPath -Value $e.Data }
          }
          $proc.add_OutputDataReceived($onData)
          $proc.add_ErrorDataReceived($onData)

          $proc.Start() | Out-Null
          $proc.BeginOutputReadLine()
          $proc.BeginErrorReadLine()

          # Wait for the tunnel URL to appear in the log
          Write-Host "Waiting for tunnel URL..."
          $timeout = 45
          $counter = 0
          while ($counter -lt $timeout) {
              Start-Sleep -Seconds 2
              $counter += 2
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
                  if ($content -and ($content -match "tcp://" -or $content -match "pgy\.in" -or $content -match "pinggy")) {
                      break
                  }
              }
          }

          # Debug: Show the full log so we can see exactly what Pinggy output
          Write-Host "--- Debug: Tunnel Log Content ---"
          if (Test-Path $logFile) { Get-Content $logFile } else { Write-Host "Log file not found." }
          Write-Host "--------------------------------"

          $PINGGY_SSH = Select-String -Path $logFile -Pattern "tcp://[^ ]*\.(pgy\.in|pinggy\.link|pinggy\.io):[0-9]+" | ForEach-Object { $_.Matches.Value } | Select-Object -First 1

          Write-Host "=========================================================="
          Write-Host "SSH Address: $PINGGY_SSH"
          Write-Host "Username: runneradmin"
          Write-Host "Password: RunnerAdmin123!"
          Write-Host "=========================================================="

          # Save connection info
          "SSH_ADDRESS: $PINGGY_SSH`n" +
          "USERNAME: runneradmin`n" +
          "PASSWORD: RunnerAdmin123!" | Out-File -FilePath "ssh_connection.txt"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh_connection.txt
          git commit -m "Update windows SSH connection details [skip ci]"
          git push origin HEAD:main

      - name: Interactive Session Wait
        shell: powershell
        run: |
          Write-Host "Entering interactive session. Create a file named 'C:\save' or 'C:\continue' to stop."
          while ($true) {
              if ((Test-Path "C:\save") -or (Test-Path "C:\continue")) {
                  Write-Host "Exit signal received. Terminating interactive session."
                  break
              }
              Start-Sleep -Seconds 5
          }

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          Write-Host "Cleaning up..."
          Get-Process -Name "ssh" -ErrorAction SilentlyContinue | Stop-Process -Force
          Remove-Item -Path "C:\save", "C:\continue" -ErrorAction SilentlyContinue
